name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Find and Build with Gradle
        run: |
          # Gradlew ফাইলটি খুঁজে বের করা
          GRADLEW_PATH=$(find . -name gradlew | head -n 1)
          
          if [ -z "$GRADLEW_PATH" ]; then
            echo "Error: gradlew file not found!"
            exit 1
          fi
          
          echo "Found gradlew at: $GRADLEW_PATH"
          GRADLEW_DIR=$(dirname "$GRADLEW_PATH")
          
          # পারমিশন ঠিক করা
          chmod +x "$GRADLEW_PATH"
          
          # বিল্ড করা
          cd "$GRADLEW_DIR"
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          # এটি যেকোনো সাব-ফোল্ডারে তৈরি হওয়া APK খুঁজে বের করবে
          path: '**/build/outputs/apk/debug/*.apk'
